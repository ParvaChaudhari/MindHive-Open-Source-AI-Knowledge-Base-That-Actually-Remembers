services:
  redis:
    image: redis:7-alpine
    container_name: mindhive-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - mindhive-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindhive-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://mindhive-redis:6379
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174
    networks:
      - mindhive-network
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mindhive-frontend
    ports:
      - "5174:5173"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    networks:
      - mindhive-network
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules

volumes:
  redis_data:

networks:
  mindhive-network:
    driver: bridge
