steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/mindhive-495523/github.com/parvachaudhari/mindhive-open-source-ai-knowledge-base-that-actually-remembers:$COMMIT_SHA"
      - "-f"
      - "backend/Dockerfile"
      - "backend"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/mindhive-495523/github.com/parvachaudhari/mindhive-open-source-ai-knowledge-base-that-actually-remembers:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "mindhive-backend"
      - "--image"
      - "gcr.io/mindhive-495523/github.com/parvachaudhari/mindhive-open-source-ai-knowledge-base-that-actually-remembers:$COMMIT_SHA"
      - "--region"
      - "us-west1"
      - "--platform"
      - "managed"

images:
  - "gcr.io/mindhive-495523/github.com/parvachaudhari/mindhive-open-source-ai-knowledge-base-that-actually-remembers:$COMMIT_SHA"
